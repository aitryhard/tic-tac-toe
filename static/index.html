<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe</title>
    <link rel="stylesheet" href="/style.css?v=2">
</head>
<body>
    <div id="app">
        <div id="menu">
            <h1 class="title">
                <span>T</span><span>i</span><span>c</span>
                <span class="space"> </span>
                <span>T</span><span>a</span><span>c</span>
                <span class="space"> </span>
                <span>T</span><span>o</span><span>e</span>
            </h1>
            <button id="btn-vs-player" class="primary">Create Room (vs Player)</button>
            <button id="btn-vs-ai" class="primary">Play vs AI</button>
            <div id="join-section">
                <input id="room-code-input" placeholder="Room code" maxlength="6">
                <button id="btn-join" class="primary">Join</button>
            </div>
                <button id="btn-theme-menu" class="theme-btn">
                    <svg class="icon-sun" viewBox="0 0 24 24" width="16" height="16"><path d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72 1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" fill="none"/><circle cx="12" cy="12" r="4" fill="currentColor"/></svg>
                    <svg class="icon-moon" viewBox="0 0 24 24" width="16" height="16"><path d="M20 12.79A9 9 0 1 1 11.21 4 7 7 0 0 0 20 12.79z" fill="currentColor"/></svg>
                </button>
        </div>

        <div id="game" style="display:none">
            <div id="header">
                <span id="room-label">
                    <span id="room-code-text"></span>
                    <span id="copy-btn" title="Copy room code"></span>
                    <span id="copy-toast">Copied!</span>
                </span>
                <button id="btn-restart">Restart</button>
                <button id="btn-leave">Leave</button>
                <button id="btn-theme-game" class="theme-btn">
                    <svg class="icon-sun" viewBox="0 0 24 24" width="16" height="16"><path d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72 1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" fill="none"/><circle cx="12" cy="12" r="4" fill="currentColor"/></svg>
                    <svg class="icon-moon" viewBox="0 0 24 24" width="16" height="16"><path d="M20 12.79A9 9 0 1 1 11.21 4 7 7 0 0 0 20 12.79z" fill="currentColor"/></svg>
                </button>
            </div>
            <div id="board">
                <div class="cell" data-i="0">
                    <svg class="mark x" viewBox="0 0 100 100"><line x1="18" y1="18" x2="82" y2="82"/><line x1="82" y1="18" x2="18" y2="82"/></svg>
                    <svg class="mark o" viewBox="0 0 100 100"><circle cx="50" cy="50" r="34"/></svg>
                </div>
                <div class="cell" data-i="1">
                    <svg class="mark x" viewBox="0 0 100 100"><line x1="18" y1="18" x2="82" y2="82"/><line x1="82" y1="18" x2="18" y2="82"/></svg>
                    <svg class="mark o" viewBox="0 0 100 100"><circle cx="50" cy="50" r="34"/></svg>
                </div>
                <div class="cell" data-i="2">
                    <svg class="mark x" viewBox="0 0 100 100"><line x1="18" y1="18" x2="82" y2="82"/><line x1="82" y1="18" x2="18" y2="82"/></svg>
                    <svg class="mark o" viewBox="0 0 100 100"><circle cx="50" cy="50" r="34"/></svg>
                </div>
                <div class="cell" data-i="3">
                    <svg class="mark x" viewBox="0 0 100 100"><line x1="18" y1="18" x2="82" y2="82"/><line x1="82" y1="18" x2="18" y2="82"/></svg>
                    <svg class="mark o" viewBox="0 0 100 100"><circle cx="50" cy="50" r="34"/></svg>
                </div>
                <div class="cell" data-i="4">
                    <svg class="mark x" viewBox="0 0 100 100"><line x1="18" y1="18" x2="82" y2="82"/><line x1="82" y1="18" x2="18" y2="82"/></svg>
                    <svg class="mark o" viewBox="0 0 100 100"><circle cx="50" cy="50" r="34"/></svg>
                </div>
                <div class="cell" data-i="5">
                    <svg class="mark x" viewBox="0 0 100 100"><line x1="18" y1="18" x2="82" y2="82"/><line x1="82" y1="18" x2="18" y2="82"/></svg>
                    <svg class="mark o" viewBox="0 0 100 100"><circle cx="50" cy="50" r="34"/></svg>
                </div>
                <div class="cell" data-i="6">
                    <svg class="mark x" viewBox="0 0 100 100"><line x1="18" y1="18" x2="82" y2="82"/><line x1="82" y1="18" x2="18" y2="82"/></svg>
                    <svg class="mark o" viewBox="0 0 100 100"><circle cx="50" cy="50" r="34"/></svg>
                </div>
                <div class="cell" data-i="7">
                    <svg class="mark x" viewBox="0 0 100 100"><line x1="18" y1="18" x2="82" y2="82"/><line x1="82" y1="18" x2="18" y2="82"/></svg>
                    <svg class="mark o" viewBox="0 0 100 100"><circle cx="50" cy="50" r="34"/></svg>
                </div>
                <div class="cell" data-i="8">
                    <svg class="mark x" viewBox="0 0 100 100"><line x1="18" y1="18" x2="82" y2="82"/><line x1="82" y1="18" x2="18" y2="82"/></svg>
                    <svg class="mark o" viewBox="0 0 100 100"><circle cx="50" cy="50" r="34"/></svg>
                </div>
            </div>
            <div id="status"></div>
        </div>
    </div>

    <script src="/script.js"></script>
</body>
</html>
