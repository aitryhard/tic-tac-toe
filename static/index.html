<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe</title>
    <link rel="stylesheet" href="/style.css?v=3">
</head>
<body>
    <div id="app">
        <div id="menu">
            <h1 class="title" id="title"></h1>
            <button id="btn-vs-player" class="primary"></button>
            <button id="btn-vs-ai" class="primary"></button>
            <div id="join-section">
                <input id="room-code-input" placeholder="" maxlength="6">
                <button id="btn-join" class="primary"></button>
            </div>
            <div class="menu-utils">
                <button id="btn-theme-menu" class="theme-btn">
                    <svg class="icon-sun" viewBox="0 0 24 24" width="16" height="16"><path d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72 1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" fill="none"/><circle cx="12" cy="12" r="4" fill="currentColor"/></svg>
                    <svg class="icon-moon" viewBox="0 0 24 24" width="16" height="16"><path d="M20 12.79A9 9 0 1 1 11.21 4 7 7 0 0 0 20 12.79z" fill="currentColor"/></svg>
                </button>
                <button id="btn-lang-menu" class="lang-btn"></button>
            </div>
        </div>

        <div id="game" style="display:none">
            <div id="header">
                <span id="room-label">
                    <span id="room-code-text"></span>
                    <span id="copy-btn" title=""></span>
                    <span id="copy-toast"></span>
                </span>
                <button id="btn-restart"></button>
                <button id="btn-leave"></button>
                <button id="btn-share" class="share-btn" title="Share">↗</button>
                <button id="btn-theme-game" class="theme-btn">
                    <svg class="icon-sun" viewBox="0 0 24 24" width="16" height="16"><path d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72 1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" fill="none"/><circle cx="12" cy="12" r="4" fill="currentColor"/></svg>
                    <svg class="icon-moon" viewBox="0 0 24 24" width="16" height="16"><path d="M20 12.79A9 9 0 1 1 11.21 4 7 7 0 0 0 20 12.79z" fill="currentColor"/></svg>
                </button>
                <button id="btn-lang-game" class="lang-btn"></button>
            </div>
            <div id="timer-bar"><div id="timer-fill"></div></div>
            <div id="board">....</div>
            <div class="action-row">
                <button id="btn-restart"></button>
                <div id="status"></div>
                <button id="btn-leave"></button>
            </div>
        </div>
    </div>

    <script src="/script.js"></script>
</body>
</html>
