<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div id="app">
        <div id="menu">
            <h1>Tic-Tac-Toe</h1>
            <button id="btn-vs-player">Create Room (vs Player)</button>
            <button id="btn-vs-ai">Play vs AI</button>
            <div id="join-section">
                <input id="room-code-input" placeholder="Room code" maxlength="6">
                <button id="btn-join">Join</button>
            </div>
        </div>

        <div id="game" style="display:none">
            <div id="header">
                <span id="room-label"></span>
                <span id="status"></span>
                <button id="btn-restart">Restart</button>
                <button id="btn-leave">Leave</button>
            </div>
            <div id="board">
                <div class="cell" data-i="0">
                    <svg class="mark x" viewBox="0 0 100 100"><line x1="18" y1="18" x2="82" y2="82"/><line x1="82" y1="18" x2="18" y2="82"/></svg>
                    <svg class="mark o" viewBox="0 0 100 100"><circle cx="50" cy="50" r="34"/></svg>
                </div>
                <div class="cell" data-i="1">
                    <svg class="mark x" viewBox="0 0 100 100"><line x1="18" y1="18" x2="82" y2="82"/><line x1="82" y1="18" x2="18" y2="82"/></svg>
                    <svg class="mark o" viewBox="0 0 100 100"><circle cx="50" cy="50" r="34"/></svg>
                </div>
                <div class="cell" data-i="2">
                    <svg class="mark x" viewBox="0 0 100 100"><line x1="18" y1="18" x2="82" y2="82"/><line x1="82" y1="18" x2="18" y2="82"/></svg>
                    <svg class="mark o" viewBox="0 0 100 100"><circle cx="50" cy="50" r="34"/></svg>
                </div>
                <div class="cell" data-i="3">
                    <svg class="mark x" viewBox="0 0 100 100"><line x1="18" y1="18" x2="82" y2="82"/><line x1="82" y1="18" x2="18" y2="82"/></svg>
                    <svg class="mark o" viewBox="0 0 100 100"><circle cx="50" cy="50" r="34"/></svg>
                </div>
                <div class="cell" data-i="4">
                    <svg class="mark x" viewBox="0 0 100 100"><line x1="18" y1="18" x2="82" y2="82"/><line x1="82" y1="18" x2="18" y2="82"/></svg>
                    <svg class="mark o" viewBox="0 0 100 100"><circle cx="50" cy="50" r="34"/></svg>
                </div>
                <div class="cell" data-i="5">
                    <svg class="mark x" viewBox="0 0 100 100"><line x1="18" y1="18" x2="82" y2="82"/><line x1="82" y1="18" x2="18" y2="82"/></svg>
                    <svg class="mark o" viewBox="0 0 100 100"><circle cx="50" cy="50" r="34"/></svg>
                </div>
                <div class="cell" data-i="6">
                    <svg class="mark x" viewBox="0 0 100 100"><line x1="18" y1="18" x2="82" y2="82"/><line x1="82" y1="18" x2="18" y2="82"/></svg>
                    <svg class="mark o" viewBox="0 0 100 100"><circle cx="50" cy="50" r="34"/></svg>
                </div>
                <div class="cell" data-i="7">
                    <svg class="mark x" viewBox="0 0 100 100"><line x1="18" y1="18" x2="82" y2="82"/><line x1="82" y1="18" x2="18" y2="82"/></svg>
                    <svg class="mark o" viewBox="0 0 100 100"><circle cx="50" cy="50" r="34"/></svg>
                </div>
                <div class="cell" data-i="8">
                    <svg class="mark x" viewBox="0 0 100 100"><line x1="18" y1="18" x2="82" y2="82"/><line x1="82" y1="18" x2="18" y2="82"/></svg>
                    <svg class="mark o" viewBox="0 0 100 100"><circle cx="50" cy="50" r="34"/></svg>
                </div>
            </div>
        </div>
    </div>

    <script src="/script.js"></script>
</body>
</html>
